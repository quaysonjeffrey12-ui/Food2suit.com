<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Food2Suit | Offers &amp; Bundles</title><script src="https://cdn.tailwindcss.com"></script><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="supabase-client.js"></script><link rel="stylesheet" href="storefront.css"></head><body class="bg-[#fafafa] text-gray-950"><header class="sticky top-0 z-20 bg-gray-950 text-white"><div class="max-w-7xl mx-auto min-h-[72px] px-5 flex items-center justify-between"><a href="index.html"><b class="text-xl text-[#FF6B35]">Food2Suit</b><small class="block text-gray-300">Everything Food</small></a><nav class="hidden md:flex flex-1 justify-center gap-2 text-sm font-bold"><a href="index.html" class="px-4 py-2">Home</a><a href="menu.html" class="px-4 py-2">Menu</a><a href="offers.html" class="px-4 py-2 rounded-xl bg-[#FF6B35]">Offers &amp; Bundles</a><a href="contact.html" class="px-4 py-2">Contact Us</a></nav><span class="w-24 hidden md:block"></span></div></header><main class="max-w-7xl mx-auto px-5 py-12"><p class="text-[#FF6B35] text-xs font-bold tracking-widest uppercase">More to share</p><h1 class="text-4xl font-extrabold mt-2">Exclusive Food Bundles</h1><p class="text-gray-500 mt-3">Perfect for groups, sharing, and maximum value.</p><div class="flex flex-wrap gap-3 mt-8 mb-8"><button data-filter="all" class="filter active">All bundles</button><button data-filter="combo" class="filter">Combo meals</button><button data-filter="party" class="filter">Party trays</button></div><div id="grid" class="grid grid-cols-1 md:grid-cols-2 gap-7"></div></main><style>.filter{border:1px solid #e5e7eb;border-radius:999px;padding:10px 16px;font-weight:700;font-size:14px}.filter.active,.filter:hover{background:#FF6B35;color:#fff;border-color:#FF6B35}</style><script>
let bundles=[],filter='all';function render(){const list=bundles.filter(b=>filter==='all'||b.type===filter);grid.innerHTML=list.map(b=>`<article class="bg-white rounded-3xl overflow-hidden border border-gray-100 shadow-sm flex flex-col sm:flex-row"><img src="${b.img}" alt="${b.name}" class="sm:w-2/5 h-56 sm:h-auto object-cover"><div class="p-7 flex flex-col justify-between"><div><span class="text-xs font-bold uppercase tracking-wider text-[#FF6B35]">${b.type==='party'?'Party tray':'Combo meal'}</span><h2 class="font-extrabold text-2xl mt-2">${b.name}</h2><p class="text-sm leading-6 text-gray-500 mt-3">${b.desc}</p></div><div class="flex items-center justify-between mt-7"><b class="text-xl text-[#FF6B35]">GH₵ ${Number(b.price).toFixed(2)}</b><button onclick="Food2Suit.addToCart(bundles.find(x=>String(x.id)===this.dataset.id))" data-id="${b.id}" class="bg-gray-950 text-white px-5 py-3 rounded-full text-sm font-bold">+ Add to tray</button></div></div></article>`).join('')||'<p class="text-gray-500">No bundles in this section yet.</p>'}document.querySelectorAll('.filter').forEach(b=>b.onclick=()=>{filter=b.dataset.filter;document.querySelectorAll('.filter').forEach(x=>x.classList.remove('active'));b.classList.add('active');render()});(async()=>{const {data,error}=await Food2SuitDB.client.from('bundles').select('*').eq('is_available',true).order('sort_order');if(!error)bundles=(data||[]).map(b=>({id:b.id,name:b.name,price:b.price,type:b.bundle_type,img:b.image_url,desc:b.description}));render()})();
</script><script src="storefront.js"></script></body></html>
