<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Food2Suit | Menu</title><script src="https://cdn.tailwindcss.com"></script><link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="storefront.css"><style>body{font-family:'Plus Jakarta Sans',sans-serif}.menu-filter.active,.menu-filter:hover{color:#FF6B35;border-color:#FF6B35;background:#fff7f4}</style></head><body class="bg-[#fafafa] text-gray-950"><header class="sticky top-0 z-20 bg-gray-950 text-white"><div class="max-w-7xl mx-auto px-5 min-h-[72px] flex items-center justify-between"><a href="index.html"><b class="text-xl text-[#FF6B35]">Food2Suit</b><small class="block text-gray-300">Everything Food</small></a><nav class="hidden md:flex flex-1 justify-center gap-2 text-sm font-bold"><a href="index.html" class="px-4 py-2 rounded-xl hover:bg-white/10">Home</a><a href="menu.html" class="px-4 py-2 rounded-xl bg-[#FF6B35]">Menu</a><a href="offers.html" class="px-4 py-2 rounded-xl hover:bg-white/10">Offers & Bundles</a><a href="contact.html" class="px-4 py-2 rounded-xl hover:bg-white/10">Contact Us</a></nav><span class="w-24 hidden md:block"></span></div></header><main class="max-w-7xl mx-auto px-5 py-12"><p class="text-[#FF6B35] text-xs font-bold tracking-widest uppercase">Food2Suit menu</p><h1 class="text-4xl font-extrabold mt-2">Made fresh for you</h1><p class="text-gray-500 mt-3 mb-8">Choose a local favorite, a classic main, or something refreshing.</p><div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-3 mb-10 text-center"><button class="menu-filter active rounded-2xl border border-gray-200 bg-white py-4 font-bold text-sm" data-filter="rice">🍚<br>Rice Dishes</button><button class="menu-filter rounded-2xl border border-gray-200 bg-white py-4 font-bold text-sm" data-filter="local">🍲<br>Local Specialties</button><button class="menu-filter rounded-2xl border border-gray-200 bg-white py-4 font-bold text-sm" data-filter="salads">🥗<br>Salads & Sides</button><button class="menu-filter rounded-2xl border border-gray-200 bg-white py-4 font-bold text-sm" data-filter="drinks">🥤<br>Drinks</button><button class="menu-filter rounded-2xl border border-gray-200 bg-white py-4 font-bold text-sm" data-filter="proteins">🍗<br>Proteins</button></div><div id="grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div></main><script>const fallback=[{id:1,name:'Premium Smoky Jollof Rice',price:65,category:'mains',desc:'Authentic local party-style jollof rice with select spices.',img:'https://images.unsplash.com/photo-1604328698692-f76ea9498e76?auto=format&fit=crop&w=700&q=80'},{id:3,name:'Traditional Fufu Bowl',price:75,category:'local',desc:'Freshly pounded fufu with rich traditional soup.',img:'https://images.unsplash.com/photo-1534422298391-e4f8c172dddb?auto=format&fit=crop&w=700&q=80'},{id:18,name:'Classic Tuna Salad',price:45,category:'sides',desc:'Crisp salad with sweet corn and tuna.',img:'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?auto=format&fit=crop&w=700&q=80'},{id:23,name:'Fresh Orange Juice',price:20,category:'sides',desc:'Freshly pressed orange juice.',img:'https://images.unsplash.com/photo-1621506289937-a8e4df240d0b?auto=format&fit=crop&w=700&q=80'},{id:20,name:'Grilled Tilapia',price:65,category:'sides',desc:'Whole charcoal grilled tilapia.',img:'https://images.unsplash.com/photo-1519708227418-c8fd9a32b7a2?auto=format&fit=crop&w=700&q=80'}];const products=JSON.parse(localStorage.getItem('food2suit_registry_products')||'null')||fallback;const query=new URLSearchParams(location.search).get('filter');let filter=query||'rice';function type(p){if(p.menuCategory)return p.menuCategory;if(p.category==='mains')return'rice';if(p.category==='local')return'local';if([20,21,22].includes(Number(p.id)))return'proteins';if(Number(p.id)>=23)return'drinks';return'salads'}function render(){document.querySelectorAll('.menu-filter').forEach(b=>b.classList.toggle('active',b.dataset.filter===filter));const list=products.filter(p=>type(p)===filter);document.getElementById('grid').innerHTML=list.map(p=>`<article class="bg-white rounded-2xl border border-gray-100 overflow-hidden shadow-sm hover:-translate-y-1 hover:shadow-xl transition"><img src="${p.img}" alt="${p.name}" class="w-full h-48 object-cover"><div class="p-5"><h2 class="font-extrabold">${p.name}</h2><p class="text-sm text-gray-500 mt-2 min-h-[3rem]">${p.desc}</p><div class="flex justify-between items-center mt-5"><b class="text-[#FF6B35]">GH₵ ${Number(p.price).toFixed(2)}</b><button onclick="add(${p.id})" class="rounded-full bg-[#FF6B35] text-white px-4 py-2 text-sm font-bold">Add +</button></div></div></article>`).join('')||'<p class="text-gray-500">No dishes in this category yet.</p>'}function add(id){const p=products.find(x=>x.id===id);Food2Suit.addToCart(p);const m=JSON.parse(localStorage.getItem('food2suit_product_metrics')||'{}');m[id]=m[id]||{interactions:0,purchases:0};m[id].interactions++;m[id].purchases++;localStorage.setItem('food2suit_product_metrics',JSON.stringify(m))}document.querySelectorAll('.menu-filter').forEach(b=>b.onclick=()=>{filter=b.dataset.filter;history.replaceState({},'',`menu.html?filter=${filter}`);render()});render();</script><script src="storefront.js"></script></body></html>
