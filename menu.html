<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Food2Suit | Menu</title><script src="https://cdn.tailwindcss.com"></script><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="supabase-client.js"></script><link rel="stylesheet" href="storefront.css"><style>body{font-family:system-ui,sans-serif}.menu-filter{transition:.2s}.menu-filter:hover{transform:translateY(-4px) scale(1.03);color:#ff6b35;border-color:#ff6b35}.menu-filter.active{color:#ff6b35;border-color:#ff6b35;background:#fff7f4}.menu-filter .menu-emoji{display:block;font-size:19px;margin-bottom:5px}.menu-card img{transition:.5s}.menu-card:hover img{transform:scale(1.08)}</style></head><body class="bg-[#fafafa] text-gray-950"><header class="sticky top-0 z-20 bg-gray-950 text-white"><div class="max-w-7xl mx-auto px-5 min-h-[72px] flex items-center justify-between"><a href="index.html"><b class="text-xl text-[#FF6B35]">Food2Suit</b><small class="block text-gray-300">Everything Food</small></a><nav class="hidden md:flex flex-1 justify-center gap-2 text-sm font-bold"><a href="index.html" class="px-4 py-2">Home</a><a href="menu.html" class="px-4 py-2 rounded-xl bg-[#FF6B35]">Menu</a><a href="offers.html" class="px-4 py-2">Offers &amp; Bundles</a><a href="contact.html" class="px-4 py-2">Contact Us</a></nav><span class="w-24 hidden md:block"></span></div></header><main class="max-w-7xl mx-auto px-5 py-12"><p class="text-[#FF6B35] text-xs font-bold tracking-widest uppercase">Food2Suit menu</p><h1 class="text-4xl font-extrabold mt-2">Made fresh for you</h1><p class="text-gray-500 mt-3 mb-5">Choose a local favourite and see every extra before it reaches your tray.</p><label class="block mb-8 max-w-lg"><span class="sr-only">Search dishes</span><input id="menu-search" type="search" placeholder="Search dishes…" class="w-full rounded-2xl border border-gray-200 bg-white px-5 py-3 text-sm outline-none focus:border-[#FF6B35] focus:ring-4 focus:ring-orange-100"></label><div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-3 mb-10 text-center"><button class="menu-filter rounded-2xl border bg-white py-4 font-bold text-sm" data-filter="all"><span class="menu-emoji">🍽️</span>All dishes</button><button class="menu-filter rounded-2xl border bg-white py-4 font-bold text-sm" data-filter="rice"><span class="menu-emoji">🍚</span>Rice dishes</button><button class="menu-filter rounded-2xl border bg-white py-4 font-bold text-sm" data-filter="local"><span class="menu-emoji">🍲</span>Local specialties</button><button class="menu-filter rounded-2xl border bg-white py-4 font-bold text-sm" data-filter="salads"><span class="menu-emoji">🥗</span>Salads &amp; sides</button><button class="menu-filter rounded-2xl border bg-white py-4 font-bold text-sm" data-filter="drinks"><span class="menu-emoji">🥤</span>Drinks</button><button class="menu-filter rounded-2xl border bg-white py-4 font-bold text-sm" data-filter="proteins"><span class="menu-emoji">🍗</span>Proteins</button></div><div id="grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div></main><script>
let products=[],filter=new URLSearchParams(location.search).get('filter')||'all',search='';
const type=p=>({salads_sides:'salads',rice:'rice',local:'local',drinks:'drinks',proteins:'proteins'})[p.category]||'local';
function render(){document.querySelectorAll('.menu-filter').forEach(b=>b.classList.toggle('active',b.dataset.filter===filter));const list=(filter==='all'?products:products.filter(p=>type(p)===filter)).filter(p=>`${p.name} ${p.desc}`.toLowerCase().includes(search));grid.innerHTML=list.map(p=>`<article class="menu-card bg-white rounded-2xl border border-gray-100 overflow-hidden shadow-sm"><div class="overflow-hidden"><img src="${p.img}" alt="${p.name}" class="w-full h-48 object-cover"></div><div class="p-5"><h2 class="font-extrabold">${p.name}</h2><p class="text-sm text-gray-500 mt-2 min-h-[3rem]">${p.desc}</p><div class="flex justify-between items-center mt-5"><b class="text-[#FF6B35]">GH₵ ${Number(p.price).toFixed(2)}</b><button onclick="Food2Suit.addProduct(products.find(x=>String(x.id)===this.dataset.id))" data-id="${p.id}" class="rounded-xl bg-[#FF6B35] text-white px-4 py-2 text-sm font-bold">+ Add to tray</button></div></div></article>`).join('')||'<p class="text-gray-500">No dishes match your search.</p>'}
document.querySelectorAll('.menu-filter').forEach(b=>b.onclick=()=>{filter=b.dataset.filter;history.replaceState({},'',`menu.html?filter=${filter}`);render()});
document.getElementById('menu-search').oninput=e=>{search=e.target.value.trim().toLowerCase();render()};
(async()=>{const {data,error}=await Food2SuitDB.client.from('products').select('*').eq('is_available',true).order('sort_order');if(!error)products=(data||[]).map(p=>({id:p.id,name:p.name,price:p.price,category:p.category,img:p.image_url,desc:p.description,options:p.side_options||[]}));render()})();
</script><script src="storefront.js"></script></body></html>
