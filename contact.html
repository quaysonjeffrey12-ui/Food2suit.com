<!DOCTYPE html>
<html lang="en"><head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Food2Suit | Contact Us</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="storefront.css"><style>body{font-family:'Plus Jakarta Sans',sans-serif}</style>
</head><body class="bg-[#fafafa] text-gray-950">
<header class="sticky top-0 z-20 bg-gray-950 text-white"><div class="max-w-7xl mx-auto min-h-[72px] px-5 flex items-center justify-between"><a href="index.html"><b class="text-xl text-[#FF6B35]">Food2Suit</b><small class="block text-gray-300">Everything Food</small></a><nav class="hidden md:flex flex-1 justify-center gap-2 text-sm font-bold"><a href="index.html" class="px-4 py-2 rounded-xl hover:bg-white/10">Home</a><a href="menu.html" class="px-4 py-2 rounded-xl hover:bg-white/10">Menu</a><a href="offers.html" class="px-4 py-2 rounded-xl hover:bg-white/10">Offers &amp; Bundles</a><a href="contact.html" class="px-4 py-2 rounded-xl bg-[#FF6B35]">Contact Us</a></nav><span class="w-24 hidden md:block"></span></div></header>
<main class="max-w-5xl mx-auto px-5 py-12"><p class="text-[#FF6B35] text-xs font-bold tracking-widest uppercase">We’re here to help</p><h1 class="text-4xl font-extrabold mt-2 mb-9">Contact Food2Suit</h1><div class="grid md:grid-cols-2 gap-8"><form id="contact-form" class="bg-white border border-gray-100 rounded-3xl p-7 shadow-sm space-y-4"><h2 class="font-extrabold text-xl">Send us a message</h2><input id="contact-name" required placeholder="Full name" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3"><input id="contact-email" required type="email" placeholder="Your email address" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3"><input id="contact-phone" required type="tel" placeholder="Phone number" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3"><textarea id="contact-message" required rows="5" placeholder="How can we help?" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3"></textarea><button class="w-full bg-[#FF6B35] text-white font-bold rounded-xl py-3 hover:bg-[#e55a2b] transition">Send message</button><p id="contact-status" class="text-xs text-gray-500" aria-live="polite">Messages are sent securely to Food2Suit.</p></form><aside class="bg-gray-950 text-white rounded-3xl p-7"><h2 class="font-extrabold text-xl mb-6">Contact details</h2><div class="space-y-5 text-sm"><div><p class="text-gray-400">Email enquiries</p><a id="email" class="font-bold text-[#ff8a62]"></a></div><div><p class="text-gray-400">Hotline</p><a id="phone" class="font-bold"></a></div><div><p class="text-gray-400">Kitchen headquarters</p><p id="address" class="font-bold"></p></div></div></aside></div></main>
<script>
const info=JSON.parse(localStorage.getItem('food2suit_registry_meta')||'{}'),email=info.email||'quaysonjeffrey12@gmail.com',phone=info.phone||'+233 50 123 4567';
document.getElementById('email').textContent=email;document.getElementById('email').href='mailto:'+email;document.getElementById('phone').textContent=phone;document.getElementById('phone').href='tel:'+phone;document.getElementById('address').textContent=info.address||'East Legon, Accra, Ghana';
document.getElementById('contact-form').addEventListener('submit',async e=>{e.preventDefault();const button=e.target.querySelector('button'),status=document.getElementById('contact-status'),payload={name:document.getElementById('contact-name').value,email:document.getElementById('contact-email').value,phone:document.getElementById('contact-phone').value,message:document.getElementById('contact-message').value};button.disabled=true;button.textContent='Sending…';try{await Food2SuitDB.submitContact(payload);e.target.reset();status.textContent='Thanks—your message has been received.'}catch(_){status.textContent='We could not send that yet. Please email us directly.'}finally{button.disabled=false;button.textContent='Send message'}});
</script><script src="storefront.js"></script></body></html>
